name: Run Quality Report

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Run Quality Report
    runs-on: macos-26
    permissions:
      contents: write

    steps:
      - name: Add path globally
        run: echo "/usr/local/bin" >> $GITHUB_PATH

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # pin@v4
        with:
          lfs: 'true'
          fetch-depth: 0

      - name: Xcode select
        run: |
          sudo xcode-select -s /Applications/Xcode_26.5.app

      - name: Build and Test
        run: |
          set -o pipefail && xcodebuild -scheme Authentication test \
            -skipPackagePluginValidation \
            -destination "platform=iOS Simulator,name=iPhone 17,arch=arm64,OS=26.5" \
            -enableCodeCoverage YES \
            -resultBundlePath result.xcresult | xcbeautify
            
      - name: Run SonarCloud Scanning
        run: |
          bash xccov-to-sonarqube-generic.sh result.xcresult > sonarqube-generic-coverage.xml

          brew install sonar-scanner

          sonar-scanner \
            -Dsonar.token=$SONAR_TOKEN \
            -Dsonar.coverageReportPaths="sonarqube-generic-coverage.xml"
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Increment Version
        id: versioning
        uses: Oliver-Binns/Versioning@26996c64bce96a4bd238cc9a8fcb34cd9c2f9dc8 # pin@v1.5.2
        with:
          ACTION_TYPE: 'Release'
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
